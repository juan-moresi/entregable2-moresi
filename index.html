<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Conversión de Monedas</title>
    <link rel="stylesheet" href="css/main.css"">
</head>
<body>
    <div class="main-container">
        <div class="chat-container">
            <div class="chat-header">
                <h1 id="chatTitle">Chat de Conversión de Monedas</h1>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Escribe tu nombre...">
                <button id="sendBtn">Enviar</button>
            </div>
        </div>
        <div class="history-panel">
            <div class="history-header">Historial de Conversiones</div>
            <div class="history-content"></div>
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>
</html>
